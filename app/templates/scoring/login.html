{% extends "base.html" %}
{% block title %}Scorer Login — Mneme HQ{% endblock %}
{% block content %}
<div class="login-box">
    <h1>Mneme HQ Benchmark Scoring</h1>
    <p>Enter your scorer identity to begin.</p>
    <form method="POST" action="{{ url_for('scoring.login') }}">
        <label for="scorer_id">Scorer ID</label>
        <input type="text" id="scorer_id" name="scorer_id" required placeholder="e.g. your name">
        <label for="scorer_type">Scoring Layer</label>
        <select id="scorer_type" name="scorer_type">
            <option value="layer1" selected>Layer 1 (Human)</option>
            <option value="layer2">Layer 2</option>
            <option value="layer3">Layer 3</option>
        </select>
        <button type="submit">Start Scoring</button>
    </form>
</div>
{% endblock %}
