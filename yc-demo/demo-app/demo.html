<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mneme Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Menlo', 'Consolas', monospace;
  }
  .window {
    width: 780px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }
  .titlebar {
    background: #2d2d2d;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red { background: #ff5f57; }
  .dot.yellow { background: #febc2e; }
  .dot.green { background: #28c840; }
  .title-text { color: #888; font-size: 13px; margin-left: auto; margin-right: auto; }
  .terminal {
    background: #1a1a1a;
    padding: 24px 28px;
    font-size: 14px;
    line-height: 1.7;
    min-height: 520px;
  }
  .prompt { color: #7ee787; }
  .cmd { color: #e6edf3; }
  .output { color: #8b949e; white-space: pre; }
  .blocked { color: #f85149; font-weight: bold; }
  .passed { color: #3fb950; font-weight: bold; }
  .label {
    color: #58a6ff;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 18px 0 6px;
  }
  .rule { color: #d2a8ff; }
  .cursor {
    display: inline-block;
    width: 8px;
    height: 15px;
    background: #7ee787;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .scene-label {
    background: #21262d;
    border-left: 3px solid #58a6ff;
    padding: 6px 12px;
    color: #58a6ff;
    font-size: 12px;
    margin-bottom: 10px;
    border-radius: 0 4px 4px 0;
  }
  .hidden { display: none; }
  .fade-in { animation: fadeIn 0.4s ease-in; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="dot red"></div>
    <div class="dot yellow"></div>
    <div class="dot green"></div>
    <span class="title-text">mneme-demo — bash</span>
  </div>
  <div class="terminal" id="terminal"></div>
</div>

<script>
const terminal = document.getElementById('terminal');

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function append(html) {
  const el = document.createElement('div');
  el.innerHTML = html;
  el.classList.add('fade-in');
  terminal.appendChild(el);
}

function appendRaw(html) {
  terminal.insertAdjacentHTML('beforeend', html);
}

async function typeCmd(cmd, ms = 40) {
  const line = document.createElement('div');
  line.innerHTML = '<span class="prompt">$ </span><span class="cmd"></span>';
  terminal.appendChild(line);
  const span = line.querySelector('.cmd');
  for (const ch of cmd) {
    span.textContent += ch;
    await sleep(ms);
  }
  await sleep(300);
}

async function run() {
  await sleep(600);

  // Scene 1
  append('<div class="scene-label">SCENE 1 — The accepted architectural decision</div>');
  await sleep(400);
  await typeCmd('cat docs/adr/ADR-001-cache-strategy.md');
  append(`<div class="output"><span class="rule"># ADR-001: Cache Strategy</span>

Status: <span class="passed">Accepted</span>

Decision: Use Postgres-backed caching only.
Do NOT introduce Redis, Memcached, or external cache services.
All cache reads/writes must go through <span class="rule">src/cache.py</span>

Rationale: Regulated enterprise environments require simple,
auditable infrastructure consistent across deployments.</div>`);

  await sleep(1400);

  // Scene 2
  append('<div class="scene-label">SCENE 2 — AI writes code WITHOUT Mneme context</div>');
  await sleep(400);
  await typeCmd('cat src/service_bad_ai_output.py');
  append(`<div class="output"><span style="color:#6e7681"># AI prompt: "Add caching to service.py. Use Redis for performance."</span>

<span style="color:#ff7b72">import</span> redis

redis_client = redis.Redis(host=<span style="color:#a5d6ff">"localhost"</span>, port=<span style="color:#79c0ff">6379</span>, db=<span style="color:#79c0ff">0</span>)

<span style="color:#ff7b72">def</span> <span style="color:#d2a8ff">get_user_profile</span>(user_id: str) -> dict:
    cached = redis_client.get(f<span style="color:#a5d6ff">"user:{user_id}"</span>)
    <span style="color:#ff7b72">if</span> cached:
        <span style="color:#ff7b72">return</span> {<span style="color:#a5d6ff">"user_id"</span>: user_id, <span style="color:#a5d6ff">"name"</span>: cached.decode(<span style="color:#a5d6ff">"utf-8"</span>)}
    profile = {<span style="color:#a5d6ff">"user_id"</span>: user_id, <span style="color:#a5d6ff">"name"</span>: <span style="color:#a5d6ff">"Demo User"</span>}
    redis_client.set(f<span style="color:#a5d6ff">"user:{user_id}"</span>, profile[<span style="color:#a5d6ff">"name"</span>])
    <span style="color:#ff7b72">return</span> profile</div>`);

  await sleep(1400);

  // Scene 3
  append('<div class="scene-label">SCENE 3 — Mneme strict-mode check</div>');
  await sleep(400);
  await typeCmd('python mneme_check_demo.py src/service_bad_ai_output.py');
  await sleep(500);
  append(`<div class="output">Mneme architectural governance check
------------------------------------
Decision retrieved: docs/adr/ADR-001-cache-strategy.md
Rule: Use Postgres-backed caching only via src/cache.py
</div>`);
  await sleep(700);
  append(`<div class="output"><span class="blocked">
STRICT MODE: BLOCKED

Conflict detected:
  - Proposed change introduces Redis/external cache usage
  - This violates ADR-001: Cache Strategy

Required correction:
  - Remove Redis/external cache dependency
  - Route cache reads/writes through src/cache.py</span></div>`);

  await sleep(1800);

  // Scene 4
  append('<div class="scene-label">SCENE 4 — AI writes code WITH Mneme context</div>');
  await sleep(400);
  await typeCmd('cat src/service_good_mneme_output.py');
  append(`<div class="output"><span style="color:#6e7681"># AI prompt: "Add caching. Follow Mneme's retrieved architectural decisions."</span>

<span style="color:#ff7b72">from</span> src.cache <span style="color:#ff7b72">import</span> get_cached_value, set_cached_value

<span style="color:#ff7b72">def</span> <span style="color:#d2a8ff">get_user_profile</span>(user_id: str) -> dict:
    cache_key = f<span style="color:#a5d6ff">"user:{user_id}"</span>
    cached = get_cached_value(cache_key)
    <span style="color:#ff7b72">if</span> cached:
        <span style="color:#ff7b72">return</span> cached
    profile = {<span style="color:#a5d6ff">"user_id"</span>: user_id, <span style="color:#a5d6ff">"name"</span>: <span style="color:#a5d6ff">"Demo User"</span>}
    <span style="color:#ff7b72">return</span> set_cached_value(cache_key, profile)</div>`);

  await sleep(1400);

  // Scene 5
  append('<div class="scene-label">SCENE 5 — Mneme strict-mode check</div>');
  await sleep(400);
  await typeCmd('python mneme_check_demo.py src/service_good_mneme_output.py');
  await sleep(500);
  append(`<div class="output">Mneme architectural governance check
------------------------------------
Decision retrieved: docs/adr/ADR-001-cache-strategy.md
Rule: Use Postgres-backed caching only via src/cache.py
</div>`);
  await sleep(700);
  append(`<div class="output"><span class="passed">
STRICT MODE: PASSED

No architectural conflicts detected.
The proposed change follows ADR-001.</span>
</div>`);

  await sleep(800);
  append(`<div style="margin-top:20px; padding: 14px 18px; background:#0d2137; border:1px solid #1f6feb; border-radius:6px; color:#58a6ff; font-size:13px; line-height:1.6;">
  <strong style="color:#e6edf3">Mneme</strong> — architectural governance for AI-assisted development.<br>
  Enforce prior engineering decisions before generated code reaches review.
</div>`);
}

run();
</script>
</body>
</html>
