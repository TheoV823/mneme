name: check insight publishing invariants

# Validates that every site/insights/<slug>/index.html is fully registered:
# sitemap entry, hub card, local og.png, working og:image / twitter:image
# meta tags, and at least one incoming internal link from another site page.
#
# Contract: docs/site/insight-publishing-contract.md
# Validator: scripts/check_insights.py
#
# Path filter: only runs on PRs that touch the surfaces where registration
# can drift out of sync — article files, the hub, the sitemap, and the
# publishing scripts. Other PRs (mneme package code, ADRs, etc.) are skipped
# so this stays a lightweight check.

on:
  pull_request:
    branches: [main]
    paths:
      - 'site/insights/**'
      - 'site/insights/index.html'   # redundant under site/insights/** but listed for clarity
      - 'site/sitemap.xml'
      - 'scripts/**'

permissions:
  contents: read

jobs:
  check-insights:
    name: check_insights.py
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run insight publishing validator
        run: python scripts/check_insights.py
