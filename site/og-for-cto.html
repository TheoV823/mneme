<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0c0c0d;
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    position: relative;
  }
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,240,96,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,240,96,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .glow {
    position: absolute;
    top: -120px;
    left: -120px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle at top left, rgba(200,240,96,0.08), transparent 70%);
    pointer-events: none;
  }
  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    padding: 44px 52px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 26px;
    color: #e8e8ec;
    letter-spacing: -0.3px;
  }
  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: #c8f060;
    background: rgba(200,240,96,0.08);
    border: 1px solid rgba(200,240,96,0.25);
    border-radius: 100px;
    padding: 5px 14px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .middle {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: 680px;
    padding-top: 8px;
  }
  .heading {
    font-family: 'Instrument Serif', serif;
    font-size: 60px;
    line-height: 1.08;
    color: #e8e8ec;
    letter-spacing: -1px;
    margin-bottom: 20px;
  }
  .heading em {
    font-style: italic;
    color: #c8f060;
  }
  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    line-height: 1.65;
    color: #88889a;
    font-weight: 300;
    max-width: 580px;
  }
  .bottom {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .url {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #55555f;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  .diagram {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    z-index: 2;
  }
  .node {
    background: #141416;
    border: 1px solid #222226;
    border-radius: 8px;
    padding: 10px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 11.5px;
    color: #88889a;
    text-align: center;
    width: 200px;
    white-space: nowrap;
  }
  .node.active {
    border-color: rgba(200,240,96,0.3);
    color: #c8f060;
    background: rgba(200,240,96,0.04);
    box-shadow: 0 0 0 1px rgba(200,240,96,0.08) inset;
  }
  .connector {
    width: 1px;
    height: 22px;
    background: linear-gradient(to bottom, #222226, #2e2e34);
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .connector::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 5px solid #2e2e34;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="container">
    <div class="top">
      <span class="logo">Mneme HQ</span>
      <span class="tag">For CTOs</span>
    </div>
    <div class="middle">
      <div class="heading">AI velocity without <em>architectural</em> drift</div>
      <div class="subtitle">Ship faster with AI without trading codebase coherence.<br>Mneme HQ keeps every agent inside your guardrails.</div>
    </div>
    <div class="bottom">
      <div></div>
      <div class="url">mnemehq.com/for/cto</div>
    </div>
  </div>
  <div class="diagram">
    <div class="node">Engineering Team</div>
    <div class="connector"></div>
    <div class="node active">Mneme HQ</div>
    <div class="connector"></div>
    <div class="node">ADRs &amp; Decisions</div>
    <div class="connector"></div>
    <div class="node">Consistent Codebase</div>
  </div>
</body>
</html>
