<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; background: #0c0c0d; font-family: 'DM Mono', monospace; overflow: hidden; position: relative; }
  .grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(200,240,96,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(200,240,96,0.04) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
  .glow { position: absolute; top: -120px; left: -120px; width: 600px; height: 600px; background: radial-gradient(circle at top left, rgba(200,240,96,0.08), transparent 70%); pointer-events: none; }
  .container { position: relative; z-index: 1; width: 100%; height: 100%; padding: 44px 52px; display: flex; flex-direction: column; justify-content: space-between; }
  .top { display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Instrument Serif', serif; font-size: 26px; color: #e8e8ec; letter-spacing: -0.3px; }
  .tag { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; color: #c8f060; background: rgba(200,240,96,0.08); border: 1px solid rgba(200,240,96,0.25); border-radius: 100px; padding: 5px 14px; letter-spacing: 0.04em; text-transform: uppercase; }
  .middle { flex: 1; display: flex; flex-direction: column; justify-content: center; max-width: 940px; padding-top: 8px; }
  .heading { font-family: 'Instrument Serif', serif; line-height: 1.05; color: #e8e8ec; letter-spacing: -1px; margin-bottom: 22px; font-size: 64px; }
  .heading em { font-style: italic; color: #c8f060; }
  .subtitle { font-family: 'DM Mono', monospace; font-size: 15px; line-height: 1.7; color: #88889a; font-weight: 300; max-width: 740px; margin-bottom: 28px; }
  .chain { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-family: 'DM Mono', monospace; font-size: 12px; }
  .node { padding: 8px 14px; border-radius: 6px; border: 1px solid rgba(200,240,96,0.3); background: rgba(200,240,96,0.05); color: #c8f060; letter-spacing: 0.04em; text-transform: uppercase; }
  .node.origin { border-color: rgba(168,168,184,0.35); background: rgba(168,168,184,0.06); color: #a8a8b8; }
  .arr { color: #55555f; font-size: 14px; }
  .bottom { display: flex; align-items: flex-end; justify-content: flex-end; }
  .url { font-family: 'DM Mono', monospace; font-size: 12px; color: #55555f; letter-spacing: 0.01em; white-space: nowrap; }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="container">
    <div class="top">
      <span class="logo">Mneme HQ</span>
      <span class="tag">Concept</span>
    </div>
    <div class="middle">
      <div class="heading">Governance <em>provenance</em>.</div>
      <div class="subtitle">Every rule has a lineage. The chain from active constraint back to the ADR that authored it is what makes governance citable instead of folkloric.</div>
      <div class="chain">
        <span class="node">rule R</span>
        <span class="arr">&larr;</span>
        <span class="node">ADR-0017</span>
        <span class="arr">&larr;</span>
        <span class="node">supersedes P, Q</span>
        <span class="arr">&larr;</span>
        <span class="node origin">incident I-44</span>
      </div>
    </div>
    <div class="bottom">
      <div class="url">mnemehq.com/concepts/governance-provenance</div>
    </div>
  </div>
</body>
</html>
