<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; background: #0c0c0d; font-family: 'DM Mono', monospace; overflow: hidden; position: relative; }
  .grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(200,240,96,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(200,240,96,0.04) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
  .glow { position: absolute; top: -120px; right: -80px; width: 600px; height: 600px; background: radial-gradient(circle at top right, rgba(200,240,96,0.07), transparent 65%); pointer-events: none; }
  .container { position: relative; z-index: 1; width: 100%; height: 100%; padding: 44px 52px; display: flex; flex-direction: column; justify-content: space-between; }
  .top { display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Instrument Serif', serif; font-size: 26px; color: #e8e8ec; letter-spacing: -0.3px; }
  .tag { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; color: #c8f060; background: rgba(200,240,96,0.08); border: 1px solid rgba(200,240,96,0.25); border-radius: 100px; padding: 5px 14px; letter-spacing: 0.04em; text-transform: uppercase; }
  .middle { flex: 1; display: flex; flex-direction: column; justify-content: center; max-width: 1000px; padding-top: 8px; }
  .heading { font-family: 'Instrument Serif', serif; font-size: 60px; line-height: 1.08; color: #e8e8ec; letter-spacing: -1px; margin-bottom: 26px; }
  .heading em { font-style: italic; color: #c8f060; }
  .pillars { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 22px; }
  .pillar { font-family: 'DM Mono', monospace; font-size: 12px; color: #88889a; border: 1px solid #2e2e34; border-radius: 6px; padding: 8px 14px; background: #141416; letter-spacing: 0.02em; }
  .pillar strong { color: #e8e8ec; font-weight: 500; }
  .gap-row { display: flex; align-items: center; gap: 14px; }
  .gap { font-family: 'DM Mono', monospace; font-size: 12px; color: #c8f060; border: 1px solid rgba(200,240,96,0.35); border-radius: 6px; padding: 8px 14px; background: rgba(200,240,96,0.06); letter-spacing: 0.02em; }
  .gap strong { color: #c8f060; font-weight: 500; }
  .arrow { font-family: 'DM Mono', monospace; font-size: 14px; color: #44444e; }
  .bottom { display: flex; align-items: flex-end; justify-content: space-between; }
  .url { font-family: 'DM Mono', monospace; font-size: 12px; color: #55555f; letter-spacing: 0.01em; }
  .principle { font-family: 'DM Mono', monospace; font-size: 11px; color: #c8f060; letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="container">
    <div class="top">
      <span class="logo">Mneme HQ</span>
      <span class="tag">Industry Analysis</span>
    </div>
    <div class="middle">
      <div class="heading">The rise of <em>agentic</em><br>engineering education</div>
      <div class="pillars">
        <div class="pillar"><strong>Universities</strong></div>
        <div class="pillar"><strong>Hackathons</strong></div>
        <div class="pillar"><strong>Frontier labs</strong></div>
        <div class="pillar"><strong>Cohort programs</strong></div>
      </div>
      <div class="gap-row">
        <span class="arrow">&#x2192;</span>
        <span class="gap"><strong>Curriculum gap:</strong> nobody is teaching governance</span>
      </div>
    </div>
    <div class="bottom">
      <span class="principle">building an agent &ne; operating an agent</span>
      <div class="url">mnemehq.com/insights/rise-of-agentic-engineering-education</div>
    </div>
  </div>
</body>
</html>
